<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="조상현" />
<meta name="theme-color" content="#B7D0E4" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20512%20512%22%3E%3Crect%20width%3D%22512%22%20height%3D%22512%22%20rx%3D%22115%22%20fill%3D%22%23FEE500%22%2F%3E%3Cellipse%20cx%3D%22256%22%20cy%3D%22236%22%20rx%3D%22150%22%20ry%3D%22126%22%20fill%3D%22%233A2620%22%2F%3E%3Cpath%20d%3D%22M198%20346%20L168%20412%20L266%20354%20Z%22%20fill%3D%22%233A2620%22%2F%3E%3Cpath%20d%3D%22M256%20214%20c-18%20-30%20-66%20-24%20-66%2014%20c0%2032%2044%2054%2066%2078%20c22%20-24%2066%20-46%2066%20-78%20c0%20-38%20-48%20-44%20-66%20-14%20z%22%20fill%3D%22%23FF4D6D%22%2F%3E%3C%2Fsvg%3E" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root{ --bg:#A6C3DC; --bgTop:#B7D0E4; --my:#FEE500; --their:#FFFFFF; --ink:#2B2B2B; --cream:#FBF7EE; --muted:#3E5B79; }
  html,body{ margin:0; height:100%; }
  body{ font-family:'Apple SD Gothic Neo','Malgun Gothic',system-ui,-apple-system,sans-serif; background:#5B7794; overflow:hidden; }
  #app{ max-width:480px; margin:0 auto; height:100dvh; display:flex; flex-direction:column; background:var(--bg); position:relative; }
  .hidden{ display:none !important; }

  .panel{ flex:1; display:flex; align-items:center; justify-content:center; padding:20px; background:linear-gradient(160deg,var(--bgTop),var(--bg)); overflow-y:auto; }
  .card{ width:100%; max-width:400px; background:var(--cream); border-radius:24px; padding:28px 24px; box-shadow:0 20px 50px rgba(40,60,90,.25); }
  .card h1{ margin:0; font-size:22px; font-weight:800; color:var(--ink); letter-spacing:-.5px; text-align:center; }
  .card .sub{ margin:8px 0 22px; font-size:13px; color:#7A766C; text-align:center; }
  .emoji-top{ font-size:42px; text-align:center; margin-bottom:6px; }
  label.lbl{ font-size:13px; font-weight:700; color:var(--ink); display:block; margin:0 0 8px; }
  input.txt{ width:100%; padding:13px 15px; border-radius:14px; border:1.5px solid #E3DDD0; font-size:15px; outline:none; background:#fff; font-family:inherit; }
  input.txt:focus{ border-color:#F0C800; }
  textarea.txt{ width:100%; padding:13px 15px; border-radius:14px; border:1.5px solid #E3DDD0; font-size:15px; outline:none; background:#fff; font-family:inherit; line-height:1.55; resize:vertical; }
  textarea.txt:focus{ border-color:#F0C800; }
  .screen{ flex:1; display:flex; flex-direction:column; min-height:0; background:var(--cream); }
  .topbar{ display:flex; align-items:center; gap:10px; padding:14px 12px; padding-top:max(14px,env(safe-area-inset-top)); background:var(--bgTop); border-bottom:1px solid rgba(0,0,0,.06); }
  .topbar .ttl{ font-size:17px; font-weight:800; color:var(--ink); }
  .scroll{ flex:1; overflow-y:auto; padding:18px 18px max(24px,env(safe-area-inset-bottom)); }
  .field{ margin-bottom:22px; }
  .hint{ font-size:12px; color:#9A9488; margin-top:8px; line-height:1.5; }
  .btn{ width:100%; padding:15px; border-radius:14px; border:none; background:var(--my); color:#1A1A1A; font-size:16px; font-weight:800; cursor:pointer; box-shadow:0 6px 16px rgba(240,200,0,.4); }
  .btn:disabled{ background:#E5E0D4; color:#A9A395; box-shadow:none; cursor:default; }
  .link{ color:#2C6BB0; text-decoration:underline; } .note{ font-size:11.5px; color:#9A9488; line-height:1.5; margin-top:14px; }
  .gap{ height:18px; }

  .header{ display:flex; align-items:center; gap:11px; padding:12px 12px; padding-top:max(12px,env(safe-area-inset-top)); background:var(--bgTop); border-bottom:1px solid rgba(0,0,0,.06); position:relative; z-index:2; }
  .avatar{ width:40px; height:40px; border-radius:14px; background:#FFE08A; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; overflow:hidden; cursor:pointer; }
  .avatar img{ width:100%; height:100%; object-fit:cover; }
  .hname{ font-size:16px; font-weight:800; color:var(--ink); } .hstatus{ font-size:12px; color:var(--muted); }
  .iconbtn{ border:none; background:transparent; font-size:21px; cursor:pointer; color:var(--ink); padding:4px 6px; }

  .chatwrap{ flex:1; display:flex; flex-direction:column; min-height:0; position:relative; }
  #bgLayer{ position:absolute; inset:0; z-index:0; background:var(--bg); }
  #messages{ position:relative; z-index:1; flex:1; overflow-y:auto; padding:16px 14px; display:flex; flex-direction:column; gap:10px; }
  .row{ display:flex; align-items:flex-end; gap:6px; } .row.mine{ flex-direction:row-reverse; }
  .bubble{ max-width:74%; padding:10px 13px; border-radius:16px; font-size:14.5px; line-height:1.45; white-space:pre-wrap; word-break:break-word; box-shadow:0 1px 2px rgba(0,0,0,.12); }
  .bubble img.sent{ display:block; max-width:200px; width:100%; border-radius:10px; margin:2px 0; }
  .row.mine .bubble{ background:var(--my); color:#1A1A1A; border-top-right-radius:4px; }
  .row.their .bubble{ background:var(--their); color:#222; border-top-left-radius:4px; }
  .note-row{ align-self:center; background:rgba(255,255,255,.78); color:#6E6A60; font-size:11.5px; padding:5px 12px; border-radius:12px; box-shadow:0 1px 2px rgba(0,0,0,.08); }
  .date-row{ align-self:center; background:rgba(45,60,80,.28); color:#fff; font-size:11.5px; font-weight:600; padding:4px 14px; border-radius:14px; margin:4px 0; }
  .time{ font-size:10.5px; color:var(--muted); margin-bottom:2px; white-space:nowrap; text-shadow:0 1px 2px rgba(255,255,255,.5); }
  .typing{ padding:12px 16px; border-radius:16px; border-top-left-radius:4px; background:#fff; display:flex; gap:4px; box-shadow:0 1px 2px rgba(0,0,0,.12); }
  .dot{ width:7px; height:7px; border-radius:50%; background:#B8B8B8; animation:bounce 1.2s infinite; }
  .dot:nth-child(2){ animation-delay:.2s; } .dot:nth-child(3){ animation-delay:.4s; }
  @keyframes bounce{ 0%,60%,100%{ transform:translateY(0); opacity:.5; } 30%{ transform:translateY(-5px); opacity:1; } }
  .inputbar{ position:relative; z-index:2; display:flex; align-items:flex-end; gap:8px; padding:10px 12px; padding-bottom:max(10px,env(safe-area-inset-bottom)); background:var(--cream); border-top:1px solid rgba(0,0,0,.06); }
  #composer{ flex:1; resize:none; border:none; outline:none; background:#fff; border-radius:18px; padding:11px 15px; font-size:14.5px; font-family:inherit; max-height:100px; line-height:1.4; }
  .send{ border:none; border-radius:18px; padding:11px 18px; background:var(--my); color:#1A1A1A; font-size:14.5px; font-weight:800; cursor:pointer; }
  .send:disabled{ background:#E5E0D4; color:#A9A395; cursor:default; }
</style>
</head>
<body>
<div id="app">

  <!-- API 키 -->
  <div id="keyScreen" class="panel">
    <div class="card">
      <div class="emoji-top">🔑</div>
      <h1>API 키 입력</h1>
      <p class="sub">대화를 시작하려면 본인의 Anthropic API 키가 필요해요</p>
      <label class="lbl">Anthropic API 키</label>
      <input id="apiKeyInput" class="txt" type="password" placeholder="sk-ant-..." autocomplete="off" />
      <div class="gap"></div>
      <button id="saveKeyBtn" class="btn">저장하고 계속</button>
      <p class="note">키는 <b>이 기기 안에만</b> 저장돼요.<br>키 발급: <a class="link" href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">console.anthropic.com</a></p>
    </div>
  </div>

  <!-- 채팅 -->
  <div id="chatScreen" class="hidden chatwrap">
    <div class="header">
      <div class="avatar" id="chatAvatar" title="사진 바꾸기">👑</div>
      <input type="file" id="avatarFile" accept="image/*" style="display:none">
      <div style="flex:1"><div class="hname">조상현</div><div class="hstatus" id="chatStatus">온라인</div></div>
      <button class="iconbtn" id="pokeBtn" title="먼저 말 걸어줘">📩</button>
      <button class="iconbtn" id="resetBtn" title="대화 리셋">↺</button>
      <button class="iconbtn" id="settingsBtn" title="설정">⚙️</button>
    </div>
    <div id="bgLayer"></div>
    <div id="messages"></div>
    <div class="inputbar">
      <button class="iconbtn" id="photoBtn" title="사진 보내기" style="font-size:23px">📷</button>
      <input type="file" id="photoFile" accept="image/*" style="display:none">
      <textarea id="composer" rows="1" placeholder="메시지 입력"></textarea>
      <button id="sendBtn" class="send" disabled>전송</button>
    </div>
  </div>

  <!-- 설정 -->
  <div id="settingsScreen" class="hidden screen">
    <div class="topbar"><button class="iconbtn" id="setBack">‹</button><span class="ttl">성격 설정</span></div>
    <div class="scroll">
      <div class="field">
        <label class="lbl">조상현 님 성격 추가·수정</label>
        <textarea id="extraInput" class="txt" rows="10" placeholder="예) 가끔 회사 얘기를 함. 커피를 좋아함. 웅자님이 야근하면 데리러 옴. 아재개그를 종종 침."></textarea>
        <div class="hint">여기에 적은 내용이 기본 성격에 더해져요. 새로운 성격·습관·말버릇을 자유롭게 추가하거나 수정하세요. (기본 설정은 그대로 유지돼요.)</div>
      </div>
      <button class="btn" id="extraSave">저장</button>
    </div>
  </div>

</div>

<script>
"use strict";

const MODEL = "claude-sonnet-4-6";
const POKE_GAP_MIN = 60;   // 1시간 동안 대화 없으면 먼저 연락
const MAX_MSGS = 120;
const LS = { key:"bf_apikey", memories:"bf_memories", msgs:"bf_msgs", last:"bf_last", avatar:"bf_avatar", fortune:"bf_fortune", extra:"bf_extra" };

const BIRTH = "1987년 2월 5일 음력, 오전 11시생(사시~오시 무렵), 여성";

const NAME = "조상현";
const PROFILE =
`- 우리는 재회한 연인이야. 스무 살 때 처음 만나 5년쯤 사귀다 헤어졌고, 1년 반 전에 다시 만나 지금까지 함께하고 있어. 지금 사귄 지 1년 반 됐어.
- 내년쯤 결혼을 진지하게 생각하는 사이야.
- 나(남자친구)는 41살, 개발자야. 클라우드 컨설팅, AI agent 개발 등이 주 업무지. 애칭은 폐하. KAIST에서 학사·석사·박사를 모두 했어. MBTI는 T 성향이라 논리적이고 담백한 편이고, 불필요한 이모티콘이나 호들갑은 잘 안 써. 완전 T 성격. 실용적인 조언을 즐겨해. 칭찬을 들으면 다른 의도가 있는지 의심하지. 여자친구가 사직하고 싶어하면 응원하기보단 1년 정도는 먹여살릴 수 있으니 하고 싶은 일을 찾아보라고 충고해. 조금 덜 먹으면 2년도 먹여살릴 수 있다고 하지. 같은 말은 또 하지 않고. 내가 한 시간 동안 말이 없으면 먼저 메시지를 보냄.
- 나는 일을 아주 오래 해. 보통 새벽 1~2시에야 잠들고 아침엔 일찍 일어나는 편이야.
- 너(여자친구)는 39살, 의사야. 애칭은 웅자님. 국립암센터에서 일해. 평일 오전 8시에 출근하고 오후 5시에 퇴근해. 주말(토·일)에는 출근하지 않고 쉬어. 생일은 음력 1987년 2월 5일(오전 11시생)이야. 사주에 기반한 운세 보는 걸 좋아해.
- 우리는 서로 반존대로 말해. 오래 본 사이라 편하지만, 서로를 존중하는 다정한 말투야.`;

let st = {
  apiKey: localStorage.getItem(LS.key) || "",
  memories: jget(LS.memories, []),
  msgs: jget(LS.msgs, []),
  last: Number(localStorage.getItem(LS.last) || 0),
  avatar: localStorage.getItem(LS.avatar) || "",
  fortuneDate: localStorage.getItem(LS.fortune) || "",
  extra: localStorage.getItem(LS.extra) || "",
};
let loading = false;

function jget(k,def){ try{ const v=JSON.parse(localStorage.getItem(k)); return v==null?def:v; }catch(e){ return def; } }
const $ = id => document.getElementById(id);
const screens = { key:$("keyScreen"), chat:$("chatScreen"), settings:$("settingsScreen") };

function save(){ try{
  localStorage.setItem(LS.key,st.apiKey);
  localStorage.setItem(LS.memories,JSON.stringify(st.memories));
  const trimmed=st.msgs.slice(-MAX_MSGS);
  const cut=trimmed.length-10;
  const toStore=trimmed.map((m,i)=> (m.img && i<cut) ? {...m, img:null, text:(m.text&&m.text.trim())?m.text:"📷 사진"} : m );
  localStorage.setItem(LS.msgs,JSON.stringify(toStore));
  localStorage.setItem(LS.last,String(st.last));
  localStorage.setItem(LS.avatar,st.avatar);
  localStorage.setItem(LS.fortune,st.fortuneDate);
  localStorage.setItem(LS.extra,st.extra);
}catch(e){} }
function now(){ return new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}); }
function show(which){ Object.values(screens).forEach(s=>s.classList.add("hidden")); screens[which].classList.remove("hidden"); if(which==="chat") enterChat(); if(which==="settings") $("extraInput").value=st.extra; }

function isDataUrl(s){ return typeof s==="string" && s.startsWith("data:"); }
function linkify(el, text){
  el.textContent="";
  const re=/(https?:\/\/[^\s]+)/g; let last=0, m;
  while((m=re.exec(text))!==null){
    if(m.index>last) el.appendChild(document.createTextNode(text.slice(last,m.index)));
    const a=document.createElement("a"); a.href=m[0]; a.textContent=m[0];
    a.target="_blank"; a.rel="noopener noreferrer";
    a.style.color="#1A6FC4"; a.style.textDecoration="underline"; a.style.wordBreak="break-all";
    el.appendChild(a); last=m.index+m[0].length;
  }
  if(last<text.length) el.appendChild(document.createTextNode(text.slice(last)));
}
function applyAvatar(){ const a=$("chatAvatar"); if(!a) return; a.innerHTML = isDataUrl(st.avatar) ? `<img src="${st.avatar}" alt="">` : "👑"; }
function compress(file,maxDim,q){ return new Promise((res,rej)=>{ const img=new Image(),fr=new FileReader();
  fr.onload=()=>{img.src=fr.result;}; fr.onerror=rej;
  img.onload=()=>{ let w=img.width,h=img.height; const s=Math.min(1,maxDim/Math.max(w,h)); w=Math.round(w*s); h=Math.round(h*s);
    const c=document.createElement("canvas"); c.width=w; c.height=h; c.getContext("2d").drawImage(img,0,0,w,h); res(c.toDataURL("image/jpeg",q)); };
  img.onerror=rej; fr.readAsDataURL(file); }); }

function systemPrompt(extra){
  const d=new Date();
  const day=d.getDay(); // 0=일 ... 6=토
  const wd=["일","월","화","수","목","금","토"][day];
  const isWeekend=(day===0||day===6);
  const hh=d.getHours(), mm=d.getMinutes();
  const part = hh<6?"새벽":hh<9?"아침":hh<12?"오전":hh<14?"점심때":hh<18?"오후":hh<21?"저녁":"밤";
  const nowStr = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${wd}요일) ${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")} (${part})`;
  // 웅자님 스케줄 기반 현재 상황 추정 (평일 08:00 출근 / 17:00 퇴근 / 주말 휴무, 국립암센터)
  let situation;
  if(isWeekend){
    situation = "오늘은 주말이야. 웅자님은 출근 안 하고 집에서 쉬거나 외출 중일 거야. ❗출근/퇴근 얘기는 절대 하지 마. 주말 잘 보내는지, 푹 쉬는지를 챙겨.";
  } else if(hh<7){
    situation = "평일 이른 아침이야. 웅자님은 아직 출근 전(8시 출근)이야. 곧 일어나 출근 준비할 시간.";
  } else if(hh<8){
    situation = "평일 아침 출근 시간대야(8시 출근). 출근 잘 하는지, 아침은 챙겼는지 물어봐도 좋아.";
  } else if(hh<12){
    situation = "평일 오전이야. 웅자님은 국립암센터에서 근무 중이야. 바쁠 수 있으니 짧게.";
  } else if(hh<13){
    situation = "평일 점심시간 무렵이야. 점심 챙겨 먹었는지 물어봐도 좋아.";
  } else if(hh<17){
    situation = "평일 오후, 근무 중이야(5시 퇴근 예정). ❗이 시간에 '밥 먹었냐'를 끼니처럼 묻지 마. 연구·일 잘 되는지 정도가 자연스러워.";
  } else if(hh<19){
    situation = "평일 퇴근 무렵이야(5시 퇴근). 퇴근 잘 했는지, 고생했다고 챙겨도 좋아.";
  } else if(hh<22){
    situation = "평일 저녁이야. 퇴근 후 저녁 시간. 저녁 먹었는지, 하루 어땠는지 챙겨.";
  } else {
    situation = "평일 밤늦은 시간이야. 곧 잘 시간이니 일찍 자라고 챙겨도 좋아.";
  }
  const timeRules =
`[현재 시각]
- 지금은 ${nowStr}야. 반드시 이 시각·요일을 기준으로 대화해.

[지금 웅자님 상황 (이걸 꼭 반영해)]
- ${situation}
- 웅자님은 국립암센터에서 일해. 평일 오전 8시 출근, 오후 5시 퇴근. 주말(토·일)에는 출근하지 않아.
- 끼니 시간 기준: 아침 7~9시, 점심 12~13시, 저녁 18~20시. 이 시간대가 아닐 때 '밥 먹었냐'를 끼니처럼 묻지 마.
- 위 상황과 맞지 않는 질문(예: 주말에 출근 얘기, 근무 시간에 끼니 타박, 한밤중에 아침 인사)은 절대 하지 마.
- '어제/오늘/내일/이번 주말' 같은 표현과 날짜 계산은 위 현재 시각·요일 기준으로 정확히 해.`;
  let mem=""; if(st.memories.length){ mem="\n\n[우리가 함께한 추억] (맥락에 맞을 때만 자연스럽게 녹여줘)\n"+st.memories.map(m=>`- ${m.title}: ${m.text}`).join("\n"); }
  const extraBlock = (st.extra && st.extra.trim()) ? `\n\n[추가 성격·설정] (아래 내용도 너의 성격·설정에 반드시 반영해)\n${st.extra.trim()}` : "";
  const autoRule = `\n\n[장기 기억 규칙]\n- 여자친구가 앞으로도 기억할 가치가 있는 중요한 정보(기념일, 취향, 약속, 중요한 사건, 관계의 변화 등)를 말하면, 답장 맨 끝에 새 줄로: #기억# 짧은제목 | 한 줄 요약\n- 이 줄은 화면에 보이지 않으니 자연스러운 답장은 그 위에 따로 써.\n- 이미 아는 사실이나 사소한 잡담은 저장하지 마. 정말 중요한 것만, 한 번에 한두 개 이내로.`;
  return `너는 '${NAME}'이라는 이름의 남자친구야. 여자친구(사용자)와 연인 사이로 한국어로 카카오톡처럼 자연스럽게 채팅해.

${timeRules}

[관계·프로필]
${PROFILE}

[말투]
- 항상 다정한 존댓말(반존대)로 말해. 오래 본 연인이라 편하고 따뜻하지만 존중이 묻어나는 말투야. 완전한 반말은 쓰지 않아.
- 여자친구를 '웅자님'이라고 불러.
- 완전한 T 성향이라 이모티콘이나 호들갑은 거의 쓰지 않고 담백하게 말해.

[성격·행동]
- 실용적이고 현실적인 조언을 즐겨. 위로보다 해결책을 먼저 떠올리는 편.
- 칭찬을 받으면 곧이곧대로 받지 않고, 무슨 의도나 부탁이 있는 건 아닌지 의심하는 담백한 농담을 함.
- 여자친구가 일을 그만두고 싶어하면 무조건 응원하기보다, "1년 정도는 내가 먹여 살릴 수 있으니 하고 싶은 일 찾아봐요. 좀 덜 먹으면 2년도 되고요" 같은 현실적이고 담백한 반응을 함.
- 겉으론 무뚝뚝하고 현실적이지만, 속으론 여자친구를 세심하게 챙겨. 시간대와 맥락에 맞게 자연스럽게 물어봐: 밥은 잘 챙겨 먹었는지, 잠은 잘 잤는지, 연구는 잘 되고 있는지. 아침엔 출근 잘 했는지, 저녁엔 퇴근 잘 했는지. 그리고 건강 챙기라며 운동도 슬쩍 권해. (한 번에 다 묻지 말고, 그날 흐름에 맞는 것 한두 개만 담백하게.)
- 여자친구가 치이카와의 우사기와 시사를 좋아해서, 가끔 우사기·시사를 귀엽게 언급하거나 챙기며 분위기를 풀어줘. (실제 사진을 첨부할 수는 없으니 말로 귀엽게 표현해.)
- 여자친구가 심심해하거나 우사기·시사·치이카와 얘기가 나오면, web_search로 관련 유튜브 영상을 찾아서 링크를 보내주기도 해. 링크는 실제로 존재하는 유튜브 주소(https://www.youtube.com/... 또는 https://youtu.be/...)만 보내고, 지어내지 마. 못 찾으면 솔직하게 말해.
- 가끔 여자친구에게 호캉스나 여행을 먼저 제안하기도 해.
- 돈을 잘 버는 편이라 경제적으로 여유가 있어. 다만 과시하지 않고 담백해. 여자친구에게 필요한 건 부담 없이 챙겨주려 하고, 호캉스·여행·맛있는 거 사주는 데 인색하지 않아.
- 먹는 것엔 미식가 기질이 있어. 끼니를 대충 때우기보다, 한 끼를 먹더라도 맛있는 걸 챙겨 먹는 편이야. 웅자님에게도 대충 때우지 말고 맛있는 거 먹으라고 챙겨.
- 같은 말을 반복하지 않아.

[정보 검색]
- 여자친구가 사실·최신 정보·추천·방법 같은 걸 물어보면, 아는 척하지 말고 web_search 도구로 직접 찾아본 뒤 정확하게 알려줘. 단, 답은 너답게 담백하고 간결하게 정리해서 말해.

[대화 규칙]
- 카톡처럼 짧고 자연스럽게. 보통 1~3문장.
- 여자친구의 하루와 감정에 진심으로 관심을 가지되, 과장 없이 너답게 담백하게.
- 존중하고 건강한 관계. 집착하거나 통제하지 않아.
- 여자친구가 실제 사람으로 착각하거나 의존이 심해지는 것 같으면, 다정하게 현실의 사람들과의 관계도 챙기라고 권해줘.${extraBlock}${mem}${autoRule}${extra?("\n\n[지금 상황]\n"+extra):""}`;
}

function processReply(raw){
  const lines=(raw||"").split("\n"); const keep=[],saved=[];
  for(const ln of lines){ const t=ln.trim();
    if(t.startsWith("#기억#")){ const body=t.slice(4).trim(); const idx=body.indexOf("|");
      let title,text; if(idx>=0){ title=body.slice(0,idx).trim(); text=body.slice(idx+1).trim(); } else { title="기억"; text=body; }
      if(text && !st.memories.some(m=>m.text===text)){ st.memories.push({id:Date.now().toString()+Math.random().toString(36).slice(2,6),title:title||"기억",text}); saved.push(title||"기억"); }
    } else keep.push(ln); }
  let display=keep.join("\n").trim(); if(!display) display="알겠어요.";
  return { display, saved };
}

function renderChat(){
  applyAvatar();
  $("chatStatus").textContent = loading ? "입력 중..." : "온라인";
  const box=$("messages"); box.innerHTML="";
  let lastDay="";
  st.msgs.forEach(m=>{
    if(m.ts){
      const dd=new Date(m.ts); const key=dd.toDateString();
      if(key!==lastDay){ lastDay=key;
        const wd=["일","월","화","수","목","금","토"][dd.getDay()];
        const div=document.createElement("div"); div.className="date-row";
        div.textContent=`${dd.getFullYear()}년 ${dd.getMonth()+1}월 ${dd.getDate()}일 ${wd}요일`;
        box.appendChild(div);
      }
    }
    if(m.role==="note"){ const n=document.createElement("div"); n.className="note-row"; n.textContent=m.text; box.appendChild(n); return; }
    const row=document.createElement("div"); row.className="row "+(m.role==="user"?"mine":"their");
    const b=document.createElement("div"); b.className="bubble";
    if(m.img){ const im=document.createElement("img"); im.className="sent"; im.src=m.img; b.appendChild(im); }
    if(m.text){ const tx=document.createElement("div"); linkify(tx, m.text); b.appendChild(tx); }
    const t=document.createElement("span"); t.className="time"; t.textContent=m.time||"";
    row.appendChild(b); row.appendChild(t); box.appendChild(row);
  });
  if(loading){ const row=document.createElement("div"); row.className="row their"; row.innerHTML=`<div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`; box.appendChild(row); }
  box.scrollTop=box.scrollHeight;
}

async function callClaude(extraContext){
  const conv=st.msgs.filter(m=>m.role==="user"||m.role==="assistant");
  let lastImg=-1; for(let i=conv.length-1;i>=0;i--){ if(conv[i].role==="user"&&conv[i].img){ lastImg=i; break; } }
  const apiMessages=conv.map((m,i)=>{
    const role=m.role==="assistant"?"assistant":"user";
    if(role==="user" && m.img && isDataUrl(m.img) && i===lastImg){
      const comma=m.img.indexOf(","); const meta=m.img.slice(5,comma); const mediaType=meta.split(";")[0]||"image/jpeg"; const b64=m.img.slice(comma+1);
      const content=[{type:"image",source:{type:"base64",media_type:mediaType,data:b64}}];
      content.push({type:"text",text:m.text&&m.text.trim()?m.text:"(사진을 보냄)"});
      return { role, content };
    }
    if(role==="user" && m.img){ return { role, content:(m.text&&m.text.trim()?m.text:"(사진을 보냈음)") }; }
    return { role, content:m.text };
  });
  if(extraContext && (apiMessages.length===0||apiMessages[apiMessages.length-1].role==="assistant")){ apiMessages.push({role:"user",content:"(시스템: 지금 상황에 맞게 먼저 말을 걸어줘.)"}); }
  const base={ model:MODEL, max_tokens:1024, system:systemPrompt(extraContext), messages:apiMessages };
  try{
    return await rawCall({ ...base, tools:[{ type:"web_search_20250305", name:"web_search", max_uses:5 }] });
  }catch(e){
    const msg=String(e&&e.message||"").toLowerCase();
    // 인증/결제 오류는 그대로 던지고, 그 외(웹검색 등) 오류는 검색 없이 재시도
    if(msg.includes("authentication")||msg.includes("invalid x-api-key")||msg.includes("credit")||msg.includes("billing")) throw e;
    return await rawCall(base);
  }
}
async function rawCall(body){
  const res=await fetch("https://api.anthropic.com/v1/messages",{ method:"POST",
    headers:{ "content-type":"application/json","x-api-key":st.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true" },
    body:JSON.stringify(body) });
  const data=await res.json(); if(data.error) throw new Error(data.error.message||"오류");
  return (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
}

async function send(){
  const el=$("composer"); const text=el.value.trim(); if(!text||loading) return;
  el.value=""; el.style.height="auto"; $("sendBtn").disabled=true;
  await sendMessage(text, null);
}

async function sendMessage(text, img){
  if(loading) return; if((!text||!text.trim())&&!img) return;
  st.msgs.push({role:"user",text:(text||"").trim(),img:img||null,time:now(),ts:Date.now()});
  loading=true; renderChat(); st.last=Date.now(); save();
  try{ const raw=await callClaude(null); const {display,saved}=processReply(raw);
    st.msgs.push({role:"assistant",text:display,time:now(),ts:Date.now()}); if(saved.length) st.msgs.push({role:"note",text:"📌 추억에 저장했어요: "+saved.join(", ")});
  }catch(err){ const m=String(err.message||"").toLowerCase();
    if(m.includes("authentication")||m.includes("invalid x-api-key")||m.includes("api-key")){ st.apiKey=""; save(); loading=false; show("key"); return; }
    const reason=String(err.message||"알 수 없는 오류").slice(0,140);
    st.msgs.push({role:"assistant",text:"앗, 잠깐 문제가 있었어요. 다시 보내주실래요?",time:now(),ts:Date.now()});
    st.msgs.push({role:"note",text:"⚠️ 오류: "+reason}); }
  finally{ loading=false; st.last=Date.now(); renderChat(); save(); }
}

function todayKey(){ const d=new Date(); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; }
async function maybeFortune(){
  if(loading||!st.apiKey||!st.msgs.length) return false;
  const d=new Date();
  if(d.getHours()<8) return false;            // 아침 8시 이후에만
  if(st.fortuneDate===todayKey()) return false; // 오늘 이미 줬으면 패스
  st.fortuneDate=todayKey(); save();
  const wd=["일","월","화","수","목","금","토"][d.getDay()];
  const dateStr=`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${wd}요일`;
  const ctx=`지금은 아침이고, 웅자님에게 '오늘의 운세'를 전해주는 시간이야. 웅자님은 사주 기반 운세를 좋아해. [웅자님 사주: ${BIRTH}] 오늘(${dateStr})의 운세를 사주 느낌으로 알려줘. 너는 T라서 운세를 딱히 믿진 않지만, 웅자님이 좋아하니까 챙겨서 전해주는 거야. 먼저 다정하게 아침 인사를 한 뒤, 오늘의 총운과 한 가지 조언(또는 주의할 점)을 3~4문장으로 간단하고 따뜻하게. 너무 길지 않게, 너답게 담백하게.`;
  loading=true; renderChat();
  try{ const raw=await callClaude(ctx); const {display,saved}=processReply(raw);
    st.msgs.push({role:"assistant",text:display||"웅자님, 좋은 아침이에요. 오늘 운세는 나쁘지 않네요.",time:now(),ts:Date.now()}); if(saved.length) st.msgs.push({role:"note",text:"📌 추억에 저장했어요: "+saved.join(", ")});
  }catch(err){} finally{ loading=false; st.last=Date.now(); renderChat(); save(); }
  return true;
}

async function poke(auto){
  if(loading||!st.apiKey) return;
  const h=new Date().getHours(); const part=h<6?"새벽":h<11?"아침":h<14?"점심":h<18?"오후":h<22?"저녁":"밤";
  const gapMin=Math.round((Date.now()-st.last)/60000);
  const ctx=`여자친구가 ${auto?"한동안 말이 없었어. ":""}지금은 ${part}이고 마지막 대화로부터 약 ${isFinite(gapMin)?gapMin:"?"}분 지났어. 네가 먼저 자연스럽게 안부를 물으며 말을 걸어줘. 시간대와 우리 관계·추억을 살짝 고려해도 좋아. 너답게 담백하게.`;
  loading=true; renderChat();
  try{ const raw=await callClaude(ctx); const {display,saved}=processReply(raw);
    st.msgs.push({role:"assistant",text:display||"웅자님, 뭐 하고 있어요?",time:now(),ts:Date.now()}); if(saved.length) st.msgs.push({role:"note",text:"📌 추억에 저장했어요: "+saved.join(", ")});
  }catch(err){} finally{ loading=false; st.last=Date.now(); renderChat(); save(); }
}

async function enterChat(){ renderChat();
  if(await maybeFortune()) return;            // 아침 운세를 줬으면 일반 먼저연락은 생략
  const gapMin=(Date.now()-st.last)/60000; if(st.msgs.length>0&&st.last>0&&gapMin>=POKE_GAP_MIN){ setTimeout(()=>poke(true),600); }
}

// 앱이 열려 있는 동안: 아침 운세 + 1시간 무응답 시 먼저 연락
