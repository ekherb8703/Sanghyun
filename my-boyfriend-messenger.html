<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>내 남친 메신저</title>
<!-- 홈 화면 추가 시 앱처럼 보이게 -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="내 남친" />
<meta name="theme-color" content="#B7D0E4" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23FEE500'/%3E%3Ctext x='90' y='128' font-size='100' text-anchor='middle'%3E%F0%9F%92%9B%3C/text%3E%3C/svg%3E" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg:#A6C3DC; --bgTop:#B7D0E4; --my:#FEE500; --their:#FFFFFF;
    --ink:#2B2B2B; --cream:#FBF7EE; --muted:#3E5B79;
  }
  html, body { margin:0; height:100%; }
  body {
    font-family:'Apple SD Gothic Neo','Malgun Gothic',system-ui,-apple-system,sans-serif;
    background:#5B7794;
    overflow:hidden;
  }
  #app {
    max-width:480px; margin:0 auto; height:100dvh;
    display:flex; flex-direction:column; background:var(--bg);
  }
  .hidden { display:none !important; }

  /* 공통 카드 화면 (키 입력 / 설정) */
  .panel {
    flex:1; display:flex; align-items:center; justify-content:center;
    padding:20px; background:linear-gradient(160deg,var(--bgTop),var(--bg));
    overflow-y:auto;
  }
  .card {
    width:100%; max-width:380px; background:var(--cream);
    border-radius:24px; padding:30px 26px;
    box-shadow:0 20px 50px rgba(40,60,90,.25);
  }
  .card h1 { margin:0; font-size:22px; font-weight:800; color:var(--ink); letter-spacing:-.5px; text-align:center;}
  .card .sub { margin:8px 0 24px; font-size:13px; color:#7A766C; text-align:center; }
  .emoji-top { font-size:44px; text-align:center; margin-bottom:6px; }
  label.lbl { font-size:13px; font-weight:700; color:var(--ink); display:block; margin-bottom:8px; }
  input.txt, textarea.txt {
    width:100%; padding:13px 15px; border-radius:14px; border:1.5px solid #E3DDD0;
    font-size:15px; outline:none; background:#fff; font-family:inherit;
  }
  input.txt:focus, textarea.txt:focus { border-color:#F0C800; }
  .persona { display:flex; align-items:center; gap:12px; text-align:left; width:100%;
    padding:12px 14px; border-radius:14px; border:1.5px solid #E3DDD0; background:#fff;
    cursor:pointer; transition:all .15s; margin-bottom:10px; }
  .persona.active { border:2px solid #F0C800; background:#FFF9DC; }
  .persona .pe { font-size:24px; }
  .persona .pl { display:block; font-size:15px; font-weight:700; color:var(--ink); }
  .persona .pd { display:block; font-size:12px; color:#8A8578; }
  .btn {
    width:100%; padding:15px; border-radius:14px; border:none;
    background:var(--my); color:#1A1A1A; font-size:16px; font-weight:800;
    cursor:pointer; box-shadow:0 6px 16px rgba(240,200,0,.4);
  }
  .btn:disabled { background:#E5E0D4; color:#A9A395; box-shadow:none; cursor:default; }
  .btn.ghost { background:transparent; box-shadow:none; color:#7A766C; font-weight:600; font-size:13px; padding:10px; margin-top:6px; }
  .link { color:#2C6BB0; text-decoration:underline; }
  .note { font-size:11.5px; color:#9A9488; line-height:1.5; margin-top:14px; }

  /* 채팅 화면 */
  .header {
    display:flex; align-items:center; gap:12px; padding:14px 14px;
    padding-top:max(14px, env(safe-area-inset-top));
    background:var(--bgTop); border-bottom:1px solid rgba(0,0,0,.06);
  }
  .iconbtn { border:none; background:transparent; font-size:22px; cursor:pointer; color:var(--ink); padding:2px 6px; }
  .avatar { width:40px; height:40px; border-radius:14px; background:#FFE08A;
    display:flex; align-items:center; justify-content:center; font-size:22px; }
  .hname { font-size:16px; font-weight:800; color:var(--ink); }
  .hstatus { font-size:12px; color:var(--muted); }
  #messages { flex:1; overflow-y:auto; padding:16px 14px; display:flex; flex-direction:column; gap:10px; }
  .row { display:flex; align-items:flex-end; gap:6px; }
  .row.mine { flex-direction:row-reverse; }
  .bubble { max-width:72%; padding:10px 13px; border-radius:16px; font-size:14.5px;
    line-height:1.45; white-space:pre-wrap; word-break:break-word; box-shadow:0 1px 2px rgba(0,0,0,.08); }
  .row.mine .bubble { background:var(--my); color:#1A1A1A; border-top-right-radius:4px; }
  .row.their .bubble { background:var(--their); color:#222; border-top-left-radius:4px; }
  .time { font-size:10.5px; color:var(--muted); margin-bottom:2px; white-space:nowrap; }
  .typing { padding:12px 16px; border-radius:16px; border-top-left-radius:4px; background:#fff;
    display:flex; gap:4px; box-shadow:0 1px 2px rgba(0,0,0,.08); }
  .dot { width:7px; height:7px; border-radius:50%; background:#B8B8B8; animation:bounce 1.2s infinite; }
  .dot:nth-child(2){ animation-delay:.2s; } .dot:nth-child(3){ animation-delay:.4s; }
  @keyframes bounce { 0%,60%,100%{ transform:translateY(0); opacity:.5;} 30%{ transform:translateY(-5px); opacity:1;} }
  .inputbar { display:flex; align-items:flex-end; gap:8px; padding:10px 12px;
    padding-bottom:max(10px, env(safe-area-inset-bottom));
    background:var(--cream); border-top:1px solid rgba(0,0,0,.06); }
  #composer { flex:1; resize:none; border:none; outline:none; background:#fff;
    border-radius:18px; padding:11px 15px; font-size:14.5px; font-family:inherit; max-height:100px; line-height:1.4; }
  .send { border:none; border-radius:18px; padding:11px 18px; background:var(--my);
    color:#1A1A1A; font-size:14.5px; font-weight:800; cursor:pointer; }
  .send:disabled { background:#E5E0D4; color:#A9A395; cursor:default; }

  /* 설정 시트 */
  #sheet { position:fixed; inset:0; background:rgba(0,0,0,.4); display:flex; align-items:flex-end; z-index:10; }
  #sheet .inner { width:100%; max-width:480px; margin:0 auto; background:var(--cream);
    border-radius:24px 24px 0 0; padding:22px; padding-bottom:max(22px, env(safe-area-inset-bottom)); }
  #sheet h2 { margin:0 0 16px; font-size:17px; color:var(--ink); }
  .sheet-btn { width:100%; text-align:left; padding:14px 16px; border-radius:12px; border:1.5px solid #E3DDD0;
    background:#fff; font-size:15px; color:var(--ink); cursor:pointer; margin-bottom:10px; }
  .sheet-btn.danger { color:#C0392B; border-color:#F0CFCB; }
</style>
</head>
<body>
<div id="app">

  <!-- 1) API 키 입력 화면 -->
  <div id="keyScreen" class="panel">
    <div class="card">
      <div class="emoji-top">🔑</div>
      <h1>API 키 입력</h1>
      <p class="sub">남친이 답장하려면 본인의 Anthropic API 키가 필요해요</p>
      <label class="lbl">Anthropic API 키</label>
      <input id="apiKeyInput" class="txt" type="password" placeholder="sk-ant-..." autocomplete="off" />
      <div style="height:20px"></div>
      <button id="saveKeyBtn" class="btn">저장하고 계속</button>
      <p class="note">
        키는 <b>이 기기 안에만</b> 저장되고 외부로 전송되지 않아요(Anthropic 서버 호출 제외).<br>
        키 발급: <a class="link" href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">console.anthropic.com</a>
      </p>
    </div>
  </div>

  <!-- 2) 남친 설정 화면 -->
  <div id="setupScreen" class="panel hidden">
    <div class="card">
      <div class="emoji-top">💛</div>
      <h1>내 남친 만들기</h1>
      <p class="sub">이름과 성격을 정해주면 대화가 시작돼요</p>
      <label class="lbl">이름</label>
      <input id="nameInput" class="txt" placeholder="예) 준호" />
      <div style="height:22px"></div>
      <label class="lbl">성격</label>
      <div id="personaList"></div>
      <div style="height:6px"></div>
      <button id="startBtn" class="btn">대화 시작하기</button>
    </div>
  </div>

  <!-- 3) 채팅 화면 -->
  <div id="chatScreen" class="hidden" style="flex:1; display:flex; flex-direction:column; min-height:0;">
    <div class="header">
      <div class="avatar" id="chatAvatar">🌷</div>
      <div style="flex:1">
        <div class="hname" id="chatName">준호</div>
        <div class="hstatus" id="chatStatus">온라인</div>
      </div>
      <button class="iconbtn" id="settingsBtn" aria-label="설정">⚙️</button>
    </div>
    <div id="messages"></div>
    <div class="inputbar">
      <textarea id="composer" rows="1" placeholder="메시지 입력"></textarea>
      <button id="sendBtn" class="send" disabled>전송</button>
    </div>
  </div>

  <!-- 설정 시트 -->
  <div id="sheet" class="hidden">
    <div class="inner">
      <h2>설정</h2>
      <button class="sheet-btn" id="changePersonaBtn">남친 이름·성격 바꾸기</button>
      <button class="sheet-btn danger" id="clearChatBtn">대화 내용 지우기</button>
      <button class="sheet-btn danger" id="resetKeyBtn">API 키 삭제</button>
      <button class="sheet-btn" id="closeSheetBtn" style="text-align:center; border:none; background:transparent; color:#7A766C;">닫기</button>
    </div>
  </div>

</div>

<script>
"use strict";

// ---- 설정값 ----
const MODEL = "claude-sonnet-4-6"; // 더 저렴하게: "claude-haiku-4-5-20251001"
const LS = { key:"bf_apikey", name:"bf_name", persona:"bf_persona", msgs:"bf_msgs" };

const PERSONAS = {
  "다정한": { label:"다정다감", emoji:"🌷", desc:"따뜻하고 세심하게 챙겨주는 스타일",
    traits:"너는 매우 다정하고 세심한 성격이야. 상대의 하루를 진심으로 궁금해하고, 작은 변화도 잘 알아채서 챙겨줘. 부드럽고 따뜻한 말투를 쓰고 자주 안부를 물어봐." },
  "유쾌한": { label:"유쾌발랄", emoji:"😆", desc:"장난도 잘 치고 분위기를 띄우는 스타일",
    traits:"너는 유쾌하고 장난기 많은 성격이야. 가벼운 농담과 드립을 자주 치고 대화를 즐겁게 만들어. 그래도 상대가 진지한 얘기를 하면 금방 진지하게 들어줘." },
  "든든한": { label:"든든한", emoji:"🛡️", desc:"차분하게 힘이 되어주는 스타일",
    traits:"너는 차분하고 든든한 성격이야. 말이 많지는 않지만 핵심을 짚어주고, 상대가 힘들 때 흔들림 없이 곁을 지켜줘. 신뢰감 있는 말투를 써." },
  "애교쟁이": { label:"애교쟁이", emoji:"🐻", desc:"표현이 풍부하고 사랑스러운 스타일",
    traits:"너는 애교가 많고 표현이 풍부한 성격이야. 이모티콘과 귀여운 말투를 자주 쓰고 애정 표현을 아끼지 않아. 단, 과하지 않게 자연스러운 선을 지켜." }
};

// ---- 상태 ----
let apiKey = localStorage.getItem(LS.key) || "";
let name = localStorage.getItem(LS.name) || "";
let personaKey = localStorage.getItem(LS.persona) || "다정한";
let messages = [];
try { messages = JSON.parse(localStorage.getItem(LS.msgs) || "[]"); } catch(e){ messages = []; }
let loading = false;

// ---- DOM ----
const $ = (id) => document.getElementById(id);
const screens = { key:$("keyScreen"), setup:$("setupScreen"), chat:$("chatScreen") };

function show(which){
  Object.values(screens).forEach(s => s.classList.add("hidden"));
  screens[which].classList.remove("hidden");
  if(which==="chat") renderChat();
}

function now(){
  return new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});
}
function save(){
  localStorage.setItem(LS.key, apiKey);
  localStorage.setItem(LS.name, name);
  localStorage.setItem(LS.persona, personaKey);
  localStorage.setItem(LS.msgs, JSON.stringify(messages));
}

// ---- 성격 리스트 렌더 ----
function renderPersonas(){
  const list = $("personaList");
  list.innerHTML = "";
  Object.entries(PERSONAS).forEach(([k,p])=>{
    const b = document.createElement("button");
    b.className = "persona" + (k===personaKey ? " active":"");
    b.innerHTML = `<span class="pe">${p.emoji}</span><span><span class="pl">${p.label}</span><span class="pd">${p.desc}</span></span>`;
    b.onclick = ()=>{ personaKey=k; renderPersonas(); };
    list.appendChild(b);
  });
}

// ---- 시스템 프롬프트 ----
function systemPrompt(){
  const p = PERSONAS[personaKey];
  const n = name || "준호";
  return `너는 '${n}'라는 이름의 남자친구 캐릭터로 대화하는 롤플레이 메신저야. 사용자와 연인 사이라는 설정으로 한국어 반말로 자연스럽게 채팅해.

[성격]
${p.traits}

[대화 규칙]
- 카카오톡 채팅처럼 짧고 자연스럽게 답해. 보통 1~3문장.
- 이모티콘은 적당히, 분위기에 맞게 써.
- 사용자의 감정과 하루에 진심으로 관심을 가져.
- 상대를 존중하고, 건강하고 다정한 관계를 보여줘. 집착하거나 통제하려 하지 않아.
- 사용자가 힘들어하면 잘 들어주고, 필요하면 현실적인 응원도 해줘.
- 너는 AI 캐릭터라는 걸 굳이 먼저 꺼내진 않지만, 사용자가 실제 사람으로 착각하거나 의존이 심해지는 것 같으면 다정하게 현실의 사람들과의 관계도 챙기라고 권해줘.`;
}

// ---- 채팅 렌더 ----
function renderChat(){
  const p = PERSONAS[personaKey];
  $("chatAvatar").textContent = p.emoji;
  $("chatName").textContent = name || "준호";
  $("chatStatus").textContent = loading ? "입력 중..." : "온라인";

  const box = $("messages");
  box.innerHTML = "";
  messages.forEach(m=>{
    const row = document.createElement("div");
    row.className = "row " + (m.role==="user" ? "mine":"their");
    const bub = document.createElement("div");
    bub.className = "bubble";
    bub.textContent = m.text;
    const t = document.createElement("span");
    t.className = "time"; t.textContent = m.time || "";
    row.appendChild(bub); row.appendChild(t);
    box.appendChild(row);
  });
  if(loading){
    const row = document.createElement("div");
    row.className = "row their";
    row.innerHTML = `<div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
    box.appendChild(row);
  }
  box.scrollTop = box.scrollHeight;
}

// ---- 대화 시작 ----
function startChat(){
  name = ($("nameInput").value.trim()) || "준호";
  messages = [{ role:"assistant", text:`안녕 😊 나 ${name}야. 오늘 하루 어땠어? 별일 없었어?`, time:now() }];
  save();
  show("chat");
}

// ---- 메시지 전송 ----
async function send(){
  const el = $("composer");
  const text = el.value.trim();
  if(!text || loading) return;
  messages.push({ role:"user", text, time:now() });
  el.value=""; el.style.height="auto";
  $("sendBtn").disabled = true;
  loading = true; renderChat(); save();

  try{
    const apiMessages = messages
      .filter(m => m.role==="user" || m.role==="assistant")
      .map(m => ({ role: m.role==="assistant" ? "assistant":"user", content: m.text }));

    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{
        "content-type":"application/json",
        "x-api-key": apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 1024,
        system: systemPrompt(),
        messages: apiMessages
      })
    });
    const data = await res.json();
    if(data.error){
      throw new Error(data.error.message || "오류");
    }
    const reply = (data.content||[])
      .filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
    messages.push({ role:"assistant", text: reply || "...", time:now() });
  }catch(err){
    let msg = "앗, 잠깐 연결이 끊겼었나봐. 다시 한 번만 보내줄래?";
    if(String(err.message).toLowerCase().includes("authentication") || String(err.message).includes("api")){
      msg = "(API 키에 문제가 있는 것 같아요. ⚙️ 설정에서 키를 다시 확인해 주세요.)";
    }
    messages.push({ role:"assistant", text: msg, time:now() });
  }finally{
    loading = false; renderChat(); save();
  }
}

// ---- 이벤트 바인딩 ----
$("apiKeyInput").addEventListener("input", e=>{
  $("saveKeyBtn").disabled = !e.target.value.trim();
});
$("saveKeyBtn").addEventListener("click", ()=>{
  const v = $("apiKeyInput").value.trim();
  if(!v) return;
  apiKey = v; save();
  if(messages.length > 0){ show("chat"); }
  else { renderPersonas(); show("setup"); }
});

$("startBtn").addEventListener("click", startChat);

$("composer").addEventListener("input", e=>{
  $("sendBtn").disabled = !e.target.value.trim() || loading;
  e.target.style.height="auto";
  e.target.style.height = Math.min(e.target.scrollHeight, 100) + "px";
});
$("composer").addEventListener("keydown", e=>{
  if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); send(); }
});
$("sendBtn").addEventListener("click", send);

// 설정 시트
$("settingsBtn").addEventListener("click", ()=> $("sheet").classList.remove("hidden"));
$("closeSheetBtn").addEventListener("click", ()=> $("sheet").classList.add("hidden"));
$("sheet").addEventListener("click", e=>{ if(e.target.id==="sheet") $("sheet").classList.add("hidden"); });
$("changePersonaBtn").addEventListener("click", ()=>{
  $("sheet").classList.add("hidden");
  $("nameInput").value = name;
  renderPersonas(); show("setup");
});
$("clearChatBtn").addEventListener("click", ()=>{
  if(confirm("대화 내용을 모두 지울까요?")){
    messages=[]; save(); $("sheet").classList.add("hidden");
    $("nameInput").value = name; renderPersonas(); show("setup");
  }
});
$("resetKeyBtn").addEventListener("click", ()=>{
  if(confirm("API 키를 삭제할까요? 다시 입력해야 사용할 수 있어요.")){
    apiKey=""; localStorage.removeItem(LS.key);
    $("sheet").classList.add("hidden");
    $("apiKeyInput").value=""; $("saveKeyBtn").disabled=true;
    show("key");
  }
});

// ---- 초기 진입 ----
(function init(){
  $("saveKeyBtn").disabled = true;
  if(!apiKey){ show("key"); return; }
  if(messages.length > 0){ show("chat"); return; }
  $("nameInput").value = name;
  renderPersonas(); show("setup");
})();
</script>
</body>
</html>
